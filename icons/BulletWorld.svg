<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Physics World icon: globe with gravity arrow -->
  <defs>
    <radialGradient id="globeGrad" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#66aaff"/>
      <stop offset="100%" stop-color="#1144aa"/>
    </radialGradient>
  </defs>
  <!-- globe body -->
  <circle cx="32" cy="30" r="26"
          fill="url(#globeGrad)" stroke="#0a2a6a" stroke-width="2"/>
  <!-- latitude lines -->
  <ellipse cx="32" cy="30" rx="26" ry="9"
           fill="none" stroke="white" stroke-width="1" opacity="0.5"/>
  <ellipse cx="32" cy="30" rx="26" ry="18"
           fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  <!-- longitude lines (vertical) -->
  <line x1="32" y1="4" x2="32" y2="56" stroke="white" stroke-width="1" opacity="0.5"/>
  <ellipse cx="32" cy="30" rx="12" ry="26"
           fill="none" stroke="white" stroke-width="1" opacity="0.4"/>
  <!-- gravity arrow (downward, red) -->
  <line x1="32" y1="44" x2="32" y2="58"
        stroke="#ff3333" stroke-width="3" stroke-linecap="round"/>
  <polygon points="32,63 27,55 37,55" fill="#ff3333"/>
  <!-- g label -->
  <text x="37" y="58" font-size="10" font-family="sans-serif"
        font-weight="bold" fill="#ff3333">g</text>
</svg>
