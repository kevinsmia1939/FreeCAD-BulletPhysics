<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="ballG" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffaa55"/>
      <stop offset="100%" stop-color="#cc5500"/>
    </radialGradient>
  </defs>
  <!-- Clock face (launch time indicator) -->
  <circle cx="16" cy="48" r="12" fill="#e8e8e8" stroke="#666" stroke-width="1.5"/>
  <line x1="16" y1="48" x2="16" y2="40" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="48" x2="21" y2="51" stroke="#e33" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Sphere -->
  <circle cx="38" cy="38" r="12" fill="url(#ballG)" stroke="#b05000" stroke-width="1.5"/>
  <!-- Launch arrow -->
  <line x1="44" y1="32" x2="58" y2="10" stroke="#ff6600" stroke-width="3"
        stroke-linecap="round"/>
  <polygon points="58,10 50,14 56,20" fill="#ff6600"/>
  <!-- Speed lines -->
  <line x1="28" y1="28" x2="22" y2="18" stroke="#ff990055" stroke-width="2"
        stroke-linecap="round"/>
  <line x1="32" y1="26" x2="28" y2="14" stroke="#ff990055" stroke-width="2"
        stroke-linecap="round"/>
</svg>
