<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Active (dynamic) rigid body: orange sphere with downward motion arrow -->
  <defs>
    <radialGradient id="activeGrad" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffcc66"/>
      <stop offset="100%" stop-color="#e06000"/>
    </radialGradient>
  </defs>
  <!-- sphere -->
  <circle cx="32" cy="28" r="18" fill="url(#activeGrad)"
          stroke="#a04000" stroke-width="2"/>
  <!-- downward arrow (gravity) -->
  <line x1="32" y1="50" x2="32" y2="60"
        stroke="#cc0000" stroke-width="3" stroke-linecap="round"/>
  <polygon points="32,63 27,56 37,56" fill="#cc0000"/>
  <!-- plus badge (add) -->
  <circle cx="52" cy="12" r="10" fill="#2ecc40" stroke="white" stroke-width="1.5"/>
  <line x1="52" y1="7" x2="52" y2="17" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="47" y1="12" x2="57" y2="12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
</svg>
