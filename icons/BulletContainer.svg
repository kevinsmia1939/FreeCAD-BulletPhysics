<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Container icon: open folder with a bullet/physics sphere -->
  <defs>
    <linearGradient id="folderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0c040"/>
      <stop offset="100%" stop-color="#c08000"/>
    </linearGradient>
    <radialGradient id="sphereGrad" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffaa55"/>
      <stop offset="100%" stop-color="#cc5500"/>
    </radialGradient>
  </defs>
  <!-- folder back -->
  <rect x="4" y="20" width="56" height="38" rx="4"
        fill="url(#folderGrad)" stroke="#906000" stroke-width="1.5"/>
  <!-- folder tab -->
  <path d="M 4 20 L 4 14 Q 4 11 7 11 L 24 11 Q 27 11 29 14 L 32 20 Z"
        fill="#f0c040" stroke="#906000" stroke-width="1.5"/>
  <!-- folder front face (open) -->
  <rect x="4" y="26" width="56" height="32" rx="4"
        fill="#fad060" stroke="#906000" stroke-width="1.5" opacity="0.85"/>
  <!-- bullet sphere inside folder -->
  <circle cx="32" cy="42" r="12"
          fill="url(#sphereGrad)" stroke="#a04000" stroke-width="1.5"/>
  <!-- small orbit ring around sphere -->
  <ellipse cx="32" cy="42" rx="17" ry="5"
           fill="none" stroke="#cc7700" stroke-width="1.2" opacity="0.7"/>
</svg>
