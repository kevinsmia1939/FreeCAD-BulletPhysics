      <stop offset="0%" stop-color="#ffaa55"/>
      <stop offset="100%" stop-color="#cc5500"/>
    </radialGradient>
  </defs>
  <!-- Ground plane -->
  <rect x="6" y="50" width="52" height="6" rx="2"
