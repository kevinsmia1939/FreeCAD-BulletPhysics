<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Run simulation: play triangle + physics dots suggesting motion -->
  <defs>
    <radialGradient id="btnGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#66cc66"/>
      <stop offset="100%" stop-color="#1a7a1a"/>
    </radialGradient>
  </defs>
  <!-- circular background -->
  <circle cx="32" cy="32" r="30" fill="url(#btnGrad)" stroke="#0a5a0a" stroke-width="2"/>
  <!-- play triangle -->
  <polygon points="24,18 24,46 50,32" fill="white" opacity="0.95"/>
  <!-- small motion dots top-right to suggest physics -->
  <circle cx="54" cy="10" r="3" fill="#ffdd44" opacity="0.9"/>
  <circle cx="58" cy="18" r="2" fill="#ffdd44" opacity="0.7"/>
  <circle cx="56" cy="26" r="2.5" fill="#ffdd44" opacity="0.5"/>
</svg>
