<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect x="4" y="4" width="56" height="56" rx="5" fill="#4A90D9"/>
  <!-- Header row -->
  <rect x="4" y="4" width="56" height="17" rx="5" fill="#2B6CB0"/>
  <rect x="4" y="16" width="56" height="5" fill="#2B6CB0"/>
  <!-- Vertical dividers -->
  <line x1="22" y1="4"  x2="22" y2="60" stroke="#1A4A80" stroke-width="1.5"/>
  <line x1="42" y1="4"  x2="42" y2="60" stroke="#1A4A80" stroke-width="1.5"/>
  <!-- Horizontal dividers -->
  <line x1="4"  y1="21" x2="60" y2="21" stroke="#1A4A80" stroke-width="1.5"/>
  <line x1="4"  y1="34" x2="60" y2="34" stroke="#1A4A80" stroke-width="1.5"/>
  <line x1="4"  y1="47" x2="60" y2="47" stroke="#1A4A80" stroke-width="1.5"/>
  <!-- Cell fill (alternating rows) -->
  <rect x="5"  y="35" width="56" height="12" fill="#5BA3E8" opacity="0.4"/>
  <!-- Header text dots -->
  <circle cx="13" cy="12" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="32" cy="12" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="51" cy="12" r="2.5" fill="white" opacity="0.9"/>
  <!-- Row content lines -->
  <rect x="7"  y="24" width="11" height="3" rx="1" fill="white" opacity="0.8"/>
  <rect x="24" y="24" width="14" height="3" rx="1" fill="white" opacity="0.8"/>
  <rect x="44" y="24" width="13" height="3" rx="1" fill="white" opacity="0.8"/>
  <rect x="7"  y="37" width="11" height="3" rx="1" fill="white" opacity="0.8"/>
  <rect x="24" y="37" width="14" height="3" rx="1" fill="white" opacity="0.8"/>
  <rect x="44" y="37" width="13" height="3" rx="1" fill="white" opacity="0.8"/>
  <rect x="7"  y="50" width="11" height="3" rx="1" fill="white" opacity="0.8"/>
  <rect x="24" y="50" width="14" height="3" rx="1" fill="white" opacity="0.8"/>
  <rect x="44" y="50" width="13" height="3" rx="1" fill="white" opacity="0.8"/>
</svg>
